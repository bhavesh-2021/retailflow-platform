name: retailflow-platform

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:9.16
    environment:
      - PGADMIN_DEFAULT_EMAIL=bhaveshjagdishsharma1300@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "8080:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    env_file:
      - ./services/user-service/.env
    volumes:
      - ./services/user-service:/app
      - /app/node_modules
    depends_on:
      - postgres

volumes:
  postgres-data:
  pgadmin-data:
